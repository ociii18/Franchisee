<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="manifest" href="/manifest.json">

<style>
*{ box-sizing:border-box; margin:0; padding:0; }

html,body{
  height:100%;
  font-family:Arial, sans-serif;
  background:#f3f4f6;
}

.container{
  width:100%;
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:flex-start;
  padding:12px;
}

.card{
  width:100%;
  max-width:420px;
  background:white;
  padding:16px;
  border-radius:14px;
  box-shadow:0 6px 14px rgba(0,0,0,.1);
}

h2{ text-align:center; font-size:20px; margin-bottom:16px; }

label{
  font-weight:bold;
  font-size:14px;
  margin-bottom:4px;
  display:block;
}

input,select{
  width:100%;
  padding:12px;
  margin-bottom:14px;
  border:1px solid #ccc;
  border-radius:8px;
  font-size:16px;
}

.row{ display:flex; gap:8px; }
.row input{ flex:1; }

.searchBtn{
  width:60px;
  background:#1e88e5;
  color:white;
  border:none;
  border-radius:8px;
  font-size:20px;
}

.info{
  background:#eef1f8;
  padding:12px;
  border-radius:8px;
  margin-bottom:14px;
  font-size:14px;
}

button.send{
  width:100%;
  padding:14px;
  font-size:16px;
  background:#2e7d32;
  color:white;
  border:none;
  border-radius:8px;
}

#status{
  text-align:center;
  margin-top:10px;
  font-size:14px;
  font-weight:bold;
  color:#2e7d32;
}

@media (max-width:480px){
  .card{ border-radius:0; box-shadow:none; max-width:100%; }
}
</style>
</head>

<body>

<div class="container">
<div style="width:100%; max-width:420px;">

<div class="card">

<h2>Franchisee Form</h2>

<label>Phone</label>
<div class="row">
  <input id="phone" placeholder="Enter phone">
  <button class="searchBtn" onclick="lookup()">🔍</button>
</div>

<div class="info">
ID: <span id="cid">-</span><br>
Name: <span id="cname">-</span>
</div>

<label>True Sale Date</label>
<input id="date" readonly>

<label>Franchise</label>
<select id="franchise" required>
  <option value="" disabled selected hidden>Select Franchise</option>
</select>

<label>Quantity (Kg)</label>
<input id="qty" type="number" oninput="calc()">

<label>Amount</label>
<input id="amount" readonly>

<button class="send" onclick="save()">Send</button>

<p id="status"></p>

</div>
</div>
</div>

<script>
const BASE_URL = "https://script.google.com/macros/s/AKfycbz3usuAc1SOpXfnz9OHUs-oU9QxnKhWQyv1kBFbj3oDbT3Refq8IHYoanIhxFLXbJjIGQ/exec";
window.onerror = function(msg, url, line, col, error) {
  document.body.innerHTML =
    "<h1>JS ERROR</h1><pre>" + msg + "\nLine: " + line + "</pre>";
};

let unitPrice = 0;
let customerFound = false;

// today date
document.getElementById("date").value =
  new Date().toLocaleDateString();

// load price
fetch(BASE_URL + "?action=price")
  .then(r => r.json())
  .then(p => unitPrice = p);

// load franchise list
fetch(BASE_URL + "?action=franchises")
  .then(r => r.json())
  .then(list => {
  const sel = document.getElementById("franchise");
  sel.length = 1;

  list.forEach(f=>{
    const o = document.createElement("option");
    o.value = f;
    o.text = f;
    sel.appendChild(o);
  });

  sel.value = "";
})

function lookup(){
  const phone = document.getElementById("phone").value;

  fetch(BASE_URL + "?action=findCustomer&phone=" + phone)
  .then(response => response.json())
  .then(data => {

    if(!data){
      document.getElementById("cid").innerText = "Not found";
      document.getElementById("cname").innerText = "-";
      customerFound = false;
      return;
    }

    document.getElementById("cid").innerText = data.id;
    document.getElementById("cname").innerText = data.name;
    customerFound = true;

  })
  .catch(error => {
    console.error("Error:", error);
  });
}

function calc(){
  const q = Number(document.getElementById("qty").value);
  document.getElementById("amount").value = q * unitPrice;
}

function save(){

  if(!customerFound){
    status("⚠️ Search valid customer first"); return;
  }

  const qty = Number(document.getElementById("qty").value);
  if(qty <= 0){
    status("⚠️ Quantity must be greater than 0"); return;
  }

  const franchise = document.getElementById("franchise").value;
  if(!franchise){
    status("⚠️ Select franchise first"); return;
  }

  const data={
    date: document.getElementById("date").value,
    customerId: document.getElementById("cid").innerText,
    name: document.getElementById("cname").innerText,
    franchise,
    phone: document.getElementById("phone").value,
    qty,
    amount: document.getElementById("amount").value
  };

  fetch(BASE_URL, {
  method: "POST",
  headers: {
    "Content-Type": "application/json"
  },
  body: JSON.stringify(data)
})
.then(response => response.json())
.then(res => {

  if(res.success){
    // If you want redirect like before:
    window.location.href = res.redirect;

    // OR just show success message:
    // status("✅ Saved successfully");
  }

})
.catch(error => {
  console.error("Error:", error);
  status("❌ Failed to save");
});
}

function status(msg){
  document.getElementById("status").innerText = msg;
}
</script>

<script>
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("sw.js");
}
</script>

</body>
</html>
